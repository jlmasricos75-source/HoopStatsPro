<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basket Stats</title>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --accent:#22c55e;
  --danger:#ef4444;
  --orange:#f97316;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.container{padding:10px;}

.player{
  position:relative;
  background:var(--card);
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
}

.pc-d{
  font-size:22px;
  font-weight:900;
  color:var(--orange);
}

.pc-n{
  font-size:12px;
}

.oc-btn{
  position:absolute;
  top:5px;
  right:5px;
  padding:4px 8px;
  border:none;
  border-radius:5px;
  font-weight:700;
  cursor:pointer;
}

.oc-in{background:var(--accent); color:black;}
.oc-out{background:var(--danger); color:white;}

.court{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:20px;
}

/* VISIBILIDAD EN PISTA (OPTIMIZADO) */
.court-player{
  width:72px;
  height:72px;
  background:#f97316;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:36px;
  font-weight:900;
  color:#000000;
  border:3px solid #111827;
  box-shadow:0 0 6px rgba(0,0,0,0.6);
}
</style>
</head>

<body>
<div class="container">

<div id="players"></div>

<div class="court" id="court"></div>

</div>

<script>
var S={
  curTeam:0,
  teams:[{
    players:[
      {id:"1",num:4,name:"Jugador 1"},
      {id:"2",num:7,name:"Jugador 2"},
      {id:"3",num:9,name:"Jugador 3"},
      {id:"4",num:12,name:"Jugador 4"},
      {id:"5",num:15,name:"Jugador 5"}
    ],
    onCourt:[]
  }]
};

function rPlayers(){
  var t=S.teams[S.curTeam];
  var html="";

  t.players.forEach(p=>{
    var on=t.onCourt.includes(p.id);

    html+=
    '<div class="player">'
    +'<div class="pc-d">'+p.num+'</div>'
    +'<div class="pc-n">'+p.name+'</div>'
    +'<button class="oc-btn '+(on?'oc-in':'oc-out')+'" onclick="return togOC(event,\''+p.id+'\',this)">'+(on?'EN':'FU')+'</button>'
    +'</div>';
  });

  document.getElementById("players").innerHTML=html;
  rCourt();
}

function rCourt(){
  var t=S.teams[S.curTeam];
  var html="";

  t.onCourt.forEach(id=>{
    var p=t.players.find(x=>x.id===id);
    if(p){
      html+='<div class="court-player">'+p.num+'</div>';
    }
  });

  document.getElementById("court").innerHTML=html;
}

function togOC(e,id,btn){
  if(e){
    if(e.preventDefault) e.preventDefault();
    if(e.stopPropagation) e.stopPropagation();
  }

  var oc=S.teams[S.curTeam].onCourt || [];
  var i=oc.indexOf(id);

  if(i>=0) oc.splice(i,1);
  else oc.push(id);

  rPlayers();
  return false;
}

rPlayers();
</script>

</body>
</html>
