<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basket Stats</title>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --accent:#22c55e;
  --danger:#ef4444;
  --orange:#f97316;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.container{
  padding:12px;
}

/* LISTA JUGADORES */
.player{
  position:relative;
  background:var(--card);
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
}

.pc-d{
  font-size:24px;
  font-weight:900;
  color:var(--orange);
}

.pc-n{
  font-size:13px;
}

/* BOTÓN */
.oc-btn{
  position:absolute;
  top:6px;
  right:6px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  font-weight:800;
  cursor:pointer;
}

.oc-in{background:var(--accent); color:black;}
.oc-out{background:var(--danger); color:white;}

/* PISTA */
.court{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  margin-top:20px;
  justify-content:center;
}

/* JUGADOR EN PISTA (MUY VISIBLE) */
.court-player{
  width:80px;
  height:80px;
  background:#f97316;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  font-weight:900;
  color:#000;
  border:4px solid #111;
  box-shadow:0 0 10px rgba(0,0,0,0.7);
}
</style>
</head>

<body>

<div class="container">
  <div id="players"></div>
  <div class="court" id="court"></div>
</div>

<script>
var S={
  curTeam:0,
  teams:[{
    players:[
      {id:"1",num:4,name:"Jugador 1"},
      {id:"2",num:7,name:"Jugador 2"},
      {id:"3",num:9,name:"Jugador 3"},
      {id:"4",num:12,name:"Jugador 4"},
      {id:"5",num:15,name:"Jugador 5"}
    ],
    onCourt:[]
  }]
};

/* RENDER JUGADORES */
function rPlayers(){
  var t=S.teams[S.curTeam];
  var html="";

  t.players.forEach(function(p){
    var on=t.onCourt.indexOf(p.id)!==-1;

    html += '<div class="player">';
    html += '<div class="pc-d">'+p.num+'</div>';
    html += '<div class="pc-n">'+p.name+'</div>';
    html += '<button class="oc-btn '+(on?'oc-in':'oc-out')+'" onclick="return togOC(event,\''+p.id+'\')">'+(on?'EN':'FU')+'</button>';
    html += '</div>';
  });

  document.getElementById("players").innerHTML=html;
  rCourt();
}

/* RENDER PISTA */
function rCourt(){
  var t=S.teams[S.curTeam];
  var html="";

  t.onCourt.forEach(function(id){
    var p=t.players.find(function(x){return x.id===id});
    if(p){
      html += '<div class="court-player">'+p.num+'</div>';
    }
  });

  document.getElementById("court").innerHTML=html;
}

/* TOGGLE ENTRAR/SALIR */
function togOC(e,id){
  if(e){
    e.preventDefault();
    e.stopPropagation();
  }

  var oc=S.teams[S.curTeam].onCourt;
  var i=oc.indexOf(id);

  if(i>=0) oc.splice(i,1);
  else oc.push(id);

  rPlayers();
  return false;
}

/* INIT */
rPlayers();
</script>

</body>
</html>
