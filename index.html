<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HoopStat PRO">
<meta name="theme-color" content="#F97316">
<title>HoopStat PRO</title>
<style>
:root {
  --bg: #0A0A0A;
  --card: #1A1A1A;
  --text: #E2E8F0;
  --accent: #F97316;
  --danger: #EF4444;
  --naranja: #F97316;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui;
  background: var(--bg);
  color: var(--text);
  padding: 10px;
  min-height: 100vh;
  overflow-x: hidden;
  touch-action: manipulation;
}

.nav {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  overflow-x: auto;
  padding-bottom: 10px;
}

.nav-btn {
  flex: 0 0 auto;
  padding: 12px 20px;
  background: var(--card);
  color: var(--text);
  border: none;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  touch-action: manipulation;
}

.nav-btn.active {
  background: var(--naranja);
  color: #000;
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

.container {
  max-width: 100%;
  margin: 0 auto;
}

h1 {
  text-align: center;
  color: var(--naranja);
  margin: 20px 0;
  font-size: clamp(24px, 5vw, 32px);
}

.scoreboard {
  background: var(--card);
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 20px;
  text-align: center;
  box-shadow: 0 8px 32px rgba(249,115,22,0.3);
}

.team-name {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.score-display {
  font-size: clamp(36px, 12vw, 64px);
  font-weight: 900;
  color: var(--naranja);
  margin: 10px 0;
}

.period-info {
  font-size: 14px;
  opacity: 0.8;
}

.action-buttons {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(85px, 1fr));
  gap: 15px;
  margin: 20px 0;
}

.btn {
  padding: 20px;
  border: none;
  border-radius: 16px;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  touch-action: manipulation;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.btn-primary { 
  background: var(--naranja); 
  color: #000; 
}
.btn-primary:active { 
  background: #EA580C; 
  transform: scale(0.95); 
}
.btn-danger { 
  background: var(--danger); 
  color: white; 
}
.btn-danger:active { 
  background: #DC2626; 
  transform: scale(0.95); 
}
.btn-warning { 
  background: var(--naranja); 
  color: #000; 
}
.btn-warning:active { 
  background: #EA580C; 
  transform: scale(0.95); 
}

.players-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 15px;
  margin: 20px 0;
}

.player-card {
  background: var(--card);
  padding: 18px;
  border-radius: 16px;
  text-align: center;
  position: relative;
  transition: all 0.2s;
  touch-action: manipulation;
}

.player-card.active {
  box-shadow: 0 0 20px var(--naranja);
  border: 3px solid var(--naranja);
}

.player-num {
  font-size: clamp(26px, 7vw, 38px);
  font-weight: 900;
  color: var(--naranja);
  margin-bottom: 8px;
}

.player-name {
  font-size: 13px;
  opacity: 0.9;
  margin-bottom: 10px;
}

.stats-line {
  display: flex;
  gap: 6px;
  font-size: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.stat-badge {
  background: rgba(249,115,22,0.2);
  padding: 4px 8px;
  border-radius: 8px;
  font-size: 11px;
  color: var(--naranja);
}

.court-section {
  background: var(--card);
  padding: 25px;
  border-radius: 20px;
  margin: 25px 0;
  position: relative;
}

.court-title {
  text-align: center;
  margin-bottom: 20px;
  color: var(--naranja);
  font-weight: 700;
  font-size: 18px;
}

.court-players {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
}

.court-player {
  width: 110px;
  height: 110px;
  background: linear-gradient(135deg, var(--naranja), #EA580C);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 55px;
  font-weight: 900;
  color: #000;
  border: 4px solid #333;
  box-shadow: 0 12px 30px rgba(249,115,22,0.6);
  touch-action: manipulation;
}

.video-container {
  position: relative;
  background: #000;
  border-radius: 20px;
  overflow: hidden;
  margin: 25px 0;
  height: 420px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.video-player {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.video-controls-left {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 15px;
  z-index: 2000;
  pointer-events: auto;
}

.video-controls-right {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 15px;
  z-index: 2000;
  pointer-events: auto;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  margin-bottom: 10px;
  font-weight: 700;
  color: var(--naranja);
}

.form-group input, .form-group select {
  width: 100%;
  padding: 16px;
  background: var(--card);
  border: 2px solid #333;
  border-radius: 12px;
  color: var(--text);
  font-size: 16px;
}

.form-group input::placeholder {
  color: #888;
}

.history-item {
  background: var(--card);
  padding: 20px;
  margin: 15px 0;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid #333;
}

.history-item:hover {
  box-shadow: 0 8px 25px rgba(249,115,22,0.3);
  border-color: var(--naranja);
}

.ai-container {
  background: linear-gradient(135deg, var(--naranja), #EA580C);
  padding: 25px;
  border-radius: 20px;
  margin: 25px 0;
}

.ai-response {
  background: rgba(0,0,0,0.4);
  padding: 20px;
  border-radius: 16px;
  margin-top: 20px;
  white-space: pre-wrap;
  border-left: 4px solid #000;
}

@media (max-width: 768px) {
  body { padding: 8px; }
  .action-buttons { 
    grid-template-columns: repeat(2, 1fr); 
    gap: 12px;
  }
  .court-player { 
    width: 95px !important;
    height: 95px !important;
    font-size: 48px !important;
  }
  .btn {
    padding: 22px;
    font-size: 20px;
    min-height: 65px;
  }
}
</style>
</head>

  <button class="nav-btn active" data-tab="inicio">🏀 INICIO</button>
  <button class="nav-btn" data-tab="live">LIVE</button>
  <button class="nav-btn" data-tab="video">📹 VÍDEO</button>
  <button class="nav-btn" data-tab="box">📊 BOX</button>
  <button class="nav-btn" data-tab="ai">🤖 AI</button>
  <button class="nav-btn" data-tab="history">📋</button>
</div>

      <button class="btn btn-danger" ontouchstart="resetGame();return false;" onclick="resetGame()">RESET</button>
    </div>

    <div class="players-grid" id="players-grid"></div>

    <div class="court-section">
      <div class="court-title">PISTA</div>
      <div class="court-players" id="court-players"></div>
    </div>
  </div>

  <!-- VÍDEO -->

        <button class="btn btn-danger" style="width:75px;height:75px;font-size:16px;" ontouchstart="actionVideo('falta');return false;" onclick="actionVideo('falta')">FALTA</button>
